<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRROR Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <style>
        .cart-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border-radius: 15px;
            background: var(--bg-color);
            box-shadow:
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow:
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
            padding: 5px;
            mix-blend-mode: multiply;
        }

        .item-details h3 {
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }

        .cart-summary {
            margin-top: 2rem;
            padding: 3rem 2rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cart-total {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .empty-cart-msg {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.7;
            padding: 3rem;
        }

        /* Mobile Adjustments for Cart */
        @media (max-width: 600px) {
            .cart-container {
                padding: 1rem;
                gap: 1rem;
            }

            .cart-item {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem;
            }

            .cart-item-info {
                flex-direction: column;
                text-align: center;
                margin-bottom: 1rem;
            }

            .cart-item-img {
                width: 60px;
                height: 60px;
            }

            .item-details h3 {
                font-size: 1.1rem;
            }

            .cart-summary {
                padding: 1.5rem 1rem;
            }

            .cart-total {
                font-size: 1.4rem;
            }

            .neo-btn {
                font-size: 1.1rem !important;
                padding: 1rem !important;
            }
        }

        @media (max-width: 400px) {
            .cart-container {
                padding: 0.8rem;
                gap: 0.8rem;
            }

            .cart-item {
                padding: 0.8rem;
            }

            .cart-item-img {
                width: 50px;
                height: 50px;
            }

            .item-details h3 {
                font-size: 0.95rem;
            }

            .cart-total {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation Area -->
    <nav class="neo-nav">
        <div class="brand" style="cursor: pointer;" onclick="window.location.href='home.html'">FRROR</div>
        <div class="nav-actions">
            <!-- Theme Toggle Removed -->
            <div class="cart-icon">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h2 class="section-title">Your Cart</h2>

        <div class="neo-box cart-container" id="cart-items-container">
            <!-- Items injected by cart.js -->
        </div>

        <div class="neo-box cart-summary" id="cart-summary" style="display: none;">
            <div class="cart-total">Total: $<span id="total-price">0.00</span></div>
            <button class="neo-btn"
                style="width: 100%; max-width: 300px; padding: 1.2rem; font-size: 1.3rem;">Checkout</button>
        </div>

    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="cart.js"></script>
</body>

</html>
