<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRROR Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <style>
        .cart-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border-radius: 15px;
            background: var(--bg-color);
            box-shadow:
                6px 6px 12px var(--shadow-dark),
                -6px -6px 12px var(--shadow-light);
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow:
                inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
            padding: 5px;
            mix-blend-mode: multiply;
        }

        .item-details h3 {
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }

        .cart-summary {
            margin-top: 2rem;
            padding: 3rem 2rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cart-total {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .empty-cart-msg {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.7;
            padding: 3rem;
        }

        /* Token Confirmation Modal */
        .token-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(224, 229, 236, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .token-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .token-card {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border-radius: 25px;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .token-number {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 8px;
            margin: 1rem 0;
        }

        .token-card h2 {
            color: var(--brand-color);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .token-card p {
            color: var(--text-color);
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }

        /* Mobile Adjustments for Cart */
        @media (max-width: 600px) {
            .cart-container {
                padding: 1rem;
                gap: 1rem;
            }

            .cart-item {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem;
            }

            .cart-item-info {
                flex-direction: column;
                text-align: center;
                margin-bottom: 1rem;
            }

            .cart-item-img {
                width: 60px;
                height: 60px;
            }

            .item-details h3 {
                font-size: 1.1rem;
            }

            .cart-summary {
                padding: 1.5rem 1rem;
            }

            .cart-total {
                font-size: 1.4rem;
            }

            .neo-btn {
                font-size: 1.1rem !important;
                padding: 1rem !important;
            }
        }

        @media (max-width: 400px) {
            .cart-container {
                padding: 0.8rem;
                gap: 0.8rem;
            }

            .cart-item {
                padding: 0.8rem;
            }

            .cart-item-img {
                width: 50px;
                height: 50px;
            }

            .item-details h3 {
                font-size: 0.95rem;
            }

            .cart-total {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation Area -->
    <nav class="neo-nav">
        <div class="brand" style="cursor: pointer;" onclick="window.location.href='home.html'">FRROR</div>
        <div class="nav-actions">
            <!-- Theme Toggle Removed -->
            <div class="cart-icon">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h2 class="section-title">Your Cart</h2>

        <div class="neo-box cart-container" id="cart-items-container">
            <!-- Items injected by cart.js -->
        </div>

        <div class="neo-box cart-summary" id="cart-summary" style="display: none;">
            <div class="cart-total">Total: $<span id="total-price">0.00</span></div>
            <button class="neo-btn" id="btn-checkout"
                style="width: 100%; max-width: 300px; padding: 1.2rem; font-size: 1.3rem;">Checkout</button>
        </div>

    </div>

    <!-- Token Confirmation Modal -->
    <div class="token-modal" id="token-modal">
        <div class="token-card">
            <h2>🎉 Order Placed!</h2>
            <p>Show this token to the counter</p>
            <div class="token-number" id="token-display">---</div>
            <p style="margin-top: 1rem; font-size: 0.9rem;">Save this number to track your order</p>
            <button class="neo-btn" id="btn-close-token" style="margin-top: 1.5rem; padding: 0.8rem 2rem;">Done</button>
        </div>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="cart.js"></script>
</body>

</html>
